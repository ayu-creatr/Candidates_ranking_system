# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"
  - "ChatGPT"
  # Other options: "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  Claude (Anthropic) was the primary development partner for this project — used for
  system architecture design, selecting the two-stage pipeline approach (precompute + rank),
  designing the semantic gold-sentence scoring strategy that replaces keyword matching,
  implementing the integrity/fraud detection rules (technology anachronism, experience
  mismatch, duplicated career narratives), and iterating on scoring weights.

  ChatGPT (OpenAI) was used for exploratory research and general Q&A — understanding
  the trade-offs between BM25 vs. dense retrieval, discussing NDCG/MRR evaluation
  frameworks, and validating ideas around behavioral signal weighting.

  No candidate profile data was ever fed to any external LLM. All scoring logic
  runs entirely offline on pre-computed artifacts. The final implementation,
  design decisions, and scoring formula are the original work of the submitter.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A deterministic two-stage pipeline built to resist all JD-explicit traps.

  Stage 1 (precompute.py — run once): all-MiniLM-L6-v2 encodes the expanded JD, 100K
  candidate summaries, 100K career descriptions, and ~700 distinct skills into numpy
  artifacts. Population-level P1/P99/P95 statistics are measured and frozen.

  Stage 2 (rank.py — ~90 sec): nine base components are combined —
  (1) Semantic score: P1/P99-rescaled cosine similarity of JD vs. career embedding (28%);
  (2) Production score: gold-sentence embedding similarity against 7 "shipped real systems"
      reference sentences — defeats keyword stuffing by non-tech profiles (20%);
  (3) Ownership score: gold-sentence sim for "owned the ranking layer" patterns (10%);
  (4) Evaluation score: gold-sentence sim for NDCG/MRR/A-B evaluation patterns (10%);
  (5) Retrieval score: gold-sentence sim for BM25/dense/hybrid retrieval patterns (9%);
  (6) Skill score: semantic anchor matching with proficiency, duration, endorsement weights (8%);
  (7) Career depth: YoE band × product/service ratio × tenure stability (7%);
  (8) Title score: soft gradient covering 35+ titles (5%); (9) Location (3%).
  Behavioral signals (availability, engagement, GitHub activity, notice period) contribute
  25% of the final score. A seven-rule integrity gate (experience mismatch, technology
  anachronism, duplicated narratives, honeypot company dates) hard-zeros fraudulent profiles.

